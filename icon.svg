<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="180">
      <stop offset="0" stop-color="#1c0e36"/>
      <stop offset="1" stop-color="#09090d"/>
    </radialGradient>
    <radialGradient id="glow" cx="90" cy="90" r="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7a59b8" stop-opacity=".18"/>
      <stop offset="1" stop-color="#7a59b8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round">
      <rect width="180" height="180" rx="38"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="180" height="180" fill="#0d0d10"/>
    <rect width="180" height="180" fill="url(#bg)"/>
    <rect width="180" height="180" fill="url(#glow)"/>

    <!-- Hair – top mass behind face -->
    <ellipse cx="90" cy="70" rx="57" ry="50" fill="#4a2e88"/>

    <!-- Side hair strands flowing down -->
    <path d="M 37 100 Q 27 132 33 168" stroke="#4a2e88" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M 143 100 Q 153 132 147 168" stroke="#4a2e88" stroke-width="16" stroke-linecap="round" fill="none"/>

    <!-- Hair highlight strand -->
    <path d="M 68 28 Q 80 22 90 22 Q 100 22 112 28" stroke="#7050b8" stroke-width="3" stroke-linecap="round" fill="none" opacity=".6"/>

    <!-- Face oval -->
    <ellipse cx="90" cy="103" rx="47" ry="57" fill="#0d0d14" stroke="#c0a8e8" stroke-width="1.8"/>

    <!-- Eyebrows -->
    <path d="M 66 82 Q 74 77 82 79" stroke="#c8b0ec" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 98 79 Q 106 77 114 82" stroke="#c8b0ec" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Left eye (almond) -->
    <path d="M 64 95 Q 74 88 84 95 Q 74 102 64 95 Z" stroke="#c0a8e8" stroke-width="1.8" fill="none"/>
    <circle cx="74" cy="95" r="4" fill="#c0a8e8"/>
    <circle cx="75.5" cy="93.5" r="1.5" fill="#0d0d14"/>

    <!-- Right eye (almond) -->
    <path d="M 96 95 Q 106 88 116 95 Q 106 102 96 95 Z" stroke="#c0a8e8" stroke-width="1.8" fill="none"/>
    <circle cx="106" cy="95" r="4" fill="#c0a8e8"/>
    <circle cx="107.5" cy="93.5" r="1.5" fill="#0d0d14"/>

    <!-- Nose – two subtle dots -->
    <circle cx="87" cy="116" r="2" fill="#b8a0d8" fill-opacity=".45"/>
    <circle cx="93" cy="116" r="2" fill="#b8a0d8" fill-opacity=".45"/>

    <!-- Lips – cupid's bow upper + lower -->
    <path d="M 76 131 C 82 127 87 126 90 128 C 93 126 98 127 104 131" stroke="#c0a8e8" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M 76 131 C 83 139 97 139 104 131" stroke="#c0a8e8" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Cheek dots – skincare texture -->
    <circle cx="57" cy="108" r="2.5" fill="#7a59b8" fill-opacity=".42"/>
    <circle cx="52" cy="116" r="1.7" fill="#7a59b8" fill-opacity=".28"/>
    <circle cx="123" cy="108" r="2.5" fill="#7a59b8" fill-opacity=".42"/>
    <circle cx="128" cy="116" r="1.7" fill="#7a59b8" fill-opacity=".28"/>
  </g>
</svg>
