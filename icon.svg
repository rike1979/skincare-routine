<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <clipPath id="r">
      <rect width="180" height="180" rx="40"/>
    </clipPath>
    <radialGradient id="bg" cx="70" cy="65" r="115" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c0d38"/>
      <stop offset="1" stop-color="#08080c"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#r)">
    <rect width="180" height="180" fill="url(#bg)"/>

    <!-- Hair fill – blob covering back-of-head, top-left area -->
    <path d="M 98 28
             C 92 12 70 5 48 8
             C 26 11 12 27 12 50
             C 12 73 24 96 42 110
             L 48 104
             C 36 88 34 70 40 56
             C 46 42 64 30 84 28
             C 92 27 97 27 98 28 Z"
          fill="#7a59b8"/>

    <!-- Hair texture hatching inside blob -->
    <g stroke="#9068c0" stroke-width="1.6" stroke-linecap="round" opacity="0.55">
      <line x1="18" y1="68" x2="34" y2="42"/>
      <line x1="27" y1="78" x2="44" y2="50"/>
      <line x1="37" y1="86" x2="55" y2="57"/>
      <line x1="49" y1="88" x2="65" y2="61"/>
      <line x1="60" y1="84" x2="74" y2="60"/>
    </g>

    <!-- Hair wisp curling off top-left corner -->
    <path d="M 48 8 C 36 0 20 2 12 15"
          stroke="#c0a8e8" stroke-width="2.8" fill="none"
          stroke-linecap="round" opacity="0.78"/>

    <!-- Back of head + neck – left-side contour -->
    <path d="M 98 28
             C 92 12 70 5 48 8
             C 26 11 12 27 12 50
             C 12 73 24 96 42 110
             C 55 122 59 144 57 168"
          stroke="#c0a8e8" stroke-width="4.2" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Face profile:
         forehead → brow dip → nose bridge → nose tip (far right) →
         S-curve back → philtrum → lip bump → chin → jaw              -->
    <path d="M 98 28
             C 103 15 118 9 130 13
             C 138 17 138 32 136 47
             C 134 58 136 67 143 78
             C 151 91 163 106 158 122
             C 154 133 142 136 134 131
             C 138 137 143 150 137 159
             C 130 167 115 169 103 165
             C 91 161 80 153 76 143"
          stroke="#c0a8e8" stroke-width="4.2" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Lip fill – prominent accent -->
    <path d="M 134 131
             C 142 135 149 149 143 159
             C 138 167 125 170 117 166
             C 124 158 129 144 128 136 Z"
          fill="#b888e8" opacity="0.75"/>

    <!-- Eye – small almond at brow level -->
    <path d="M 122 55 C 127 47 138 47 140 55 C 138 62 127 63 122 56 Z"
          fill="#c0a8e8" opacity="0.65"/>
  </g>
</svg>
